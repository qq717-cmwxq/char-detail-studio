<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OC角色手帐</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Noto+Sans+SC:wght@300;500;900&display=swap');

        :root {
            --bg-macaron-blue: #e0f2fe;
            --bg-macaron-pink: #fce7f3;
            --bg-macaron-yellow: #fef9c3;
            --bg-macaron-green: #dcfce7;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: #f0f4f8;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* 毛玻璃核心 */
        .glass {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        /* 细节板块：毛毡小纸条质感 */
        .sticky-note {
            box-shadow: 2px 3px 10px rgba(0,0,0,0.05);
            position: relative;
        }
        .sticky-note::after {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 0; height: 0;
            border-style: solid;
            border-width: 0 12px 12px 0;
            border-color: transparent rgba(0,0,0,0.05) transparent transparent;
        }

        /* 标签随机位置动画 */
        .tag-orbit {
            position: absolute;
            transition: all 0.5s ease;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-0 m-0">

<div id="app" class="min-h-screen flex flex-col items-center">
    
    <!-- 顶部操作：隐藏在背景中 -->
    <div class="fixed top-4 left-4 right-4 z-50 flex justify-between items-center opacity-40 hover:opacity-100 transition-opacity">
        <button @click="prevChar" class="p-2 bg-white/50 rounded-full"><i data-lucide="chevron-left"></i></button>
        <div class="flex gap-2">
            <button @click="addCharacter" class="p-2 bg-white/50 rounded-full"><i data-lucide="plus"></i></button>
            <button @click="removeCharacter" class="p-2 bg-red-100 text-red-500 rounded-full"><i data-lucide="trash-2"></i></button>
        </div>
        <button @click="nextChar" class="p-2 bg-white/50 rounded-full"><i data-lucide="chevron-right"></i></button>
    </div>

    <!-- 主展示区 -->
    <main id="capture-area" class="w-full max-w-md min-h-screen p-6 pt-16 flex flex-col items-center bg-gradient-to-b from-blue-50 to-white relative overflow-hidden">
        
        <!-- 背景装饰球 -->
        <div class="absolute -top-20 -left-20 w-64 h-64 bg-pink-100 rounded-full blur-3xl opacity-50"></div>
        <div class="absolute top-1/2 -right-20 w-64 h-64 bg-yellow-100 rounded-full blur-3xl opacity-50"></div>

        <!-- 头像与星环标签 -->
        <div class="relative w-full h-80 flex items-center justify-center mb-4">
            <!-- 随机分布的标签 -->
            <div v-for="(tag, i) in currentCharacter.tags" :key="i" 
                 class="tag-orbit glass px-3 py-1 rounded-full text-xs font-bold text-blue-600 shadow-sm whitespace-nowrap"
                 :style="tagStyles[i]"
                 @touchstart="handleLongPress('tags', i)">
                # {{ tag }}
            </div>

            <!-- 头像本体 -->
            <div @click="triggerUpload" class="relative z-10 w-40 h-40 rounded-full border-8 border-white shadow-2xl overflow-hidden bg-white cursor-pointer group">
                < img v-if="currentCharacter.avatar" :src="currentCharacter.avatar" class="w-full h-full object-cover" />
                <div v-else class="w-full h-full flex flex-col items-center justify-center text-slate-300">
                    <i data-lucide="user" class="w-12 h-12 mb-1"></i>
                    <span class="text-[10px]">上传头像</span>
                </div>
                <input type="file" ref="fileInput" class="hidden" @change="handleAvatarUpload" accept="image/*">
            </div>
        </div>

        <!-- 名字 -->
        <input v-model="currentCharacter.name" class="relative z-10 bg-transparent text-center text-3xl font-black text-slate-800 placeholder:text-slate-200 focus:outline-none mb-8 w-full" placeholder="ROLE NAME">

        <!-- 设定板块：简约横向条 -->
        <section class="w-full mb-8">
            <div class="flex items-center gap-2 mb-3">
                <div class="h-[1px] flex-1 bg-blue-200"></div>
                <span class="text-[10px] tracking-[0.3em] font-bold text-blue-400 uppercase">Settings</span>
                <div @click="addItem('settings')" class="p-1 bg-blue-100 rounded text-blue-500 cursor-pointer"><i data-lucide="plus" class="w-3 h-3"></i></div>
            </div>
            <div class="flex flex-wrap gap-2 justify-center">
                <div v-for="(s, i) in currentCharacter.settings" :key="i"
                     @touchstart="handleLongPress('settings', i)"
                     class="glass px-4 py-1.5 rounded-full text-sm text-slate-600 border border-blue-100 shadow-sm">
                    {{ s }}
                </div>
            </div>
        </section>

        <!-- 细节板块：毛毡/贴纸质感 -->
        <section class="w-full mb-8 p-4 bg-slate-100/50 rounded-[2rem] border border-white/50 shadow-inner">
            <div class="flex justify-between items-center mb-4">
                <span class="text-[10px] tracking-[0.3em] font-bold text-slate-400 uppercase ml-2">Detail Board</span>
                <button @click="addItem('details')" class="text-slate-400"><i data-lucide="paperclip" class="w-4 h-4"></i></button>
            </div>
            <div class="grid grid-cols-1 gap-4">
                <div v-for="(d, i) in currentCharacter.details" :key="i"
                     @touchstart="handleLongPress('details', i)"
                     :style="noteStyles[i]"
                     class="sticky-note p-4 text-sm text-slate-700 leading-relaxed font-medium">
                    {{ d }}
                </div>
            </div>
        </section>

        <!-- 弹幕板块：气泡 -->
        <section class="w-full mb-20">
            <div class="flex items-center gap-2 mb-4 px-2">
                <span class="text-[10px] tracking-[0.3em] font-bold text-pink-400 uppercase">Comments</span>
                <button @click="addItem('comments')" class="text-pink-300"><i data-lucide="message-circle-plus" class="w-4 h-4"></i></button>
            </div>
            <div class="space-y-3">
                <div v-for="(c, i) in currentCharacter.comments" :key="i"
                     @touchstart="handleLongPress('comments', i)"
                     :class="i % 2 === 0 ? 'bg-pink-100 text-pink-700 ml-2' : 'bg-green-100 text-green-700 mr-2 self-end'"
                     class="max-w-[80%] px-4 py-2 rounded-2xl shadow-sm text-xs italic font-bold relative">
                    “{{ c }}”
                </div>
            </div>
        </section>
    </main>

    <!-- 底部导出 -->
    <div class="fixed bottom-6 w-full max-w-xs z-50">
        <button @click="saveImage" class="w-full py-4 glass bg-white/60 rounded-full font-black text-blue-600 shadow-xl flex items-center justify-center gap-3 active:scale-95 transition-all">
            <i data-lucide="sparkles"></i> 记录此瞬间
        </button>
    </div>
</div>

<script>
    const { createApp, ref, computed, onMounted, watch, nextTick } = Vue;

    createApp({
        setup() {
            // 马卡龙色池
            const noteColors = ['#fef9c3', '#fce7f3', '#dcfce7', '#e0f2fe', '#f3e8ff'];

            const characters = ref(JSON.parse(localStorage.getItem('oc_v2_data')) || [{
                id: 1, name: '未命名角色', avatar: '',
                tags: ['年上', '温柔', '极客'],
                settings: ['戴眼镜', '深蓝西装'],
                details: ['喜欢在下雨天写代码', '随身携带一枚古旧的硬币'],
                comments: ['这个设定太戳我了！']
            }]);

            const activeIdx = ref(0);
            const currentCharacter = computed(() => characters.value[activeIdx.value]);
            const fileInput = ref(null);

            // 随机样式计算（标签星环）
            const tagStyles = ref([]);
            const noteStyles = ref([]);

            const generateStyles = () => {
                // 标签随机位置 (围绕头像旋转)
                tagStyles.value = currentCharacter.value.tags.map((_, i) => {
                    const angle = (i / currentCharacter.value.tags.length) * 2 * Math.PI + Math.random();
                    const radius = 110 + Math.random() * 40;
                    const x = Math.cos(angle) * radius;
                    const y = Math.sin(angle) * radius;
                    return {
                        left: `calc(50% + ${x}px - 20px)`,
                        top: `calc(50% + ${y}px - 10px)`,
                        transform: `rotate(${Math.random() * 20 - 10}deg)`
                    };
                });

                // 细节小纸条颜色和旋转
                noteStyles.value = currentCharacter.value.details.map((_, i) => ({
                    backgroundColor: noteColors[i % noteColors.length],
                    transform: `rotate(${Math.random() * 4 - 2}deg)`,
                    marginLeft: `${Math.random() * 10}px`,
                    marginRight: `${Math.random() * 10}px`
                }));
            };

            // 监听数据变化刷新样式
            watch(() => [currentCharacter.value.tags.length, currentCharacter.value.details.length, activeIdx.value], generateStyles);
            
            // 数据持久化
            watch(characters, (val) => {
                localStorage.setItem('oc_v2_data', JSON.stringify(val));
            }, { deep: true });

            onMounted(() => {
                lucide.createIcons();
                generateStyles();
            });

            // 方法
            const triggerUpload = () => fileInput.value.click();
            
            const handleAvatarUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    currentCharacter.value.avatar = ev.target.result;
                    nextTick(generateStyles);
                };
                reader.readAsDataURL(file);
            };

            const addItem = (type) => {
                const val = prompt(`添加${type === 'tags' ? '标签' : '内容'}:`);
                if (val) currentCharacter.value[type].push(val);
                nextTick(() => { lucide.createIcons(); generateStyles(); });
            };

            const handleLongPress = (type, index) => {
                let timer = setTimeout(() => {
                    if (confirm('删除此条内容？')) {
                        currentCharacter.value[type].splice(index, 1);
                    }
                }, 600);
                window.ontouchend = () => clearTimeout(timer);
            };

            const addCharacter = () => {
                characters.value.push({
                    id: Date.now(), name: '新角色', avatar: '',
                    tags: [], settings: [], details: [], comments: []
                });
                activeIdx.value = characters.value.length - 1;
            };

            const removeCharacter = () => {
                if (confirm('确定删除此角色？')) {
                    characters.value.splice(activeIdx.value, 1);
                    if (characters.value.length === 0) addCharacter();
                    activeIdx.value = 0;
                }
            };

            const nextChar = () => { if (activeIdx.value < characters.value.length - 1) activeIdx.value++; };
            const prevChar = () => { if (activeIdx.value > 0) activeIdx.value--; };

            const saveImage = () => {
                const area = document.getElementById('capture-area');
                html2canvas(area, {
                    scale: 3,
                    useCORS: true,
                    backgroundColor: '#ffffff'
                }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `${currentCharacter.value.name}.png`;
                    link.href = canvas.toDataURL();
                    link.click();
                });
            };

            return {
                characters, activeIdx, currentCharacter, fileInput,
                tagStyles, noteStyles,
                triggerUpload, handleAvatarUpload, addItem, handleLongPress,
                addCharacter, removeCharacter, nextChar, prevChar, saveImage
            };
        }
    }).mount('#app');
</script>
</body>
</html>
