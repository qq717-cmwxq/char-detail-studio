<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>角色记录卡册 v14 - 导出修正版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');
        body { background: #f0f4f8; font-family: sans-serif; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        /* 布局修正 */
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.4); }
        
        /* 修复偏移的关键：显式定义行高和对齐方式 */
        .draggable-item { 
            position: absolute; touch-action: none; user-select: none; 
            display: inline-flex; align-items: center; justify-content: center;
            line-height: 1.2; text-align: center;
            padding: 4px 12px;
            box-shadow: 2px 4px 10px rgba(0,0,0,0.08); 
        }

        .bubble { 
            position: relative; padding: 10px 18px; border-radius: 20px; font-size: 12px; font-weight: bold; color: white; 
            display: inline-flex; align-items: center; line-height: 1.2;
        }

        /* 导出时强制简化 CSS */
        .exporting .glass { backdrop-filter: none !important; background: #ffffff !important; border: 2px solid #eee !important; }
        .exporting .draggable-item { box-shadow: none !important; border: 0.5px solid rgba(0,0,0,0.1) !important; }
        
        .bubble-left { border-bottom-left-radius: 2px; }
        .bubble-left::after { content: ""; position: absolute; bottom: 0; left: -8px; width: 12px; height: 14px; background: inherit; clip-path: polygon(100% 0, 100% 100%, 0 100%); }
        .bubble-right { border-bottom-right-radius: 2px; }
        .bubble-right::after { content: ""; position: absolute; bottom: 0; right: -8px; width: 12px; height: 14px; background: inherit; clip-path: polygon(0 0, 0 100%, 100% 100%); }
        
        .water-chip { background: #CCF2F4; color: #008D96; border: 1px solid #A7E4E9; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        [v-cloak] { display: none; }
    </style>
</head>
<body>
<div id="app" class="max-w-md mx-auto p-4 min-h-screen pb-24" v-cloak>
    
    <!-- 顶部 -->
    <div class="flex justify-between items-center mb-6">
        <h1 style="font-family: 'ZCOOL KuaiLe';" class="text-3xl text-cyan-500">CardBox</h1>
        <button @click="addCharacter" class="w-10 h-10 bg-cyan-500 text-white rounded-full text-2xl shadow-lg">+</button>
    </div>

    <!-- 档案管理区 -->
    <div class="bg-white rounded-3xl p-4 mb-6 shadow-sm border border-gray-100">
        <div class="text-[10px] font-bold text-gray-400 mb-3 uppercase tracking-widest">Archive Management / 存档管理</div>
        <div class="grid grid-cols-2 gap-2 mb-2">
            <button @click="exportSingle" class="py-2 bg-cyan-50 text-cyan-600 text-[11px] rounded-xl font-bold">导出单人存档</button>
            <button @click="$refs.importOne.click()" class="py-2 bg-blue-50 text-blue-600 text-[11px] rounded-xl font-bold">追加单人导入</button>
        </div>
        <div class="grid grid-cols-2 gap-2 border-t border-gray-50 pt-2">
            <button @click="exportAll" class="py-2 bg-gray-800 text-white text-[11px] rounded-xl font-bold">导出全员备份</button>
            <button @click="$refs.importAll.click()" class="py-2 bg-white border border-gray-200 text-gray-600 text-[11px] rounded-xl font-bold">恢复全员备份</button>
        </div>
        <input type="file" ref="importOne" class="hidden" accept=".json" @change="importSingle">
        <input type="file" ref="importAll" class="hidden" accept=".json" @change="importAll">
    </div>

    <!-- 角色导航 -->
    <div v-if="characters.length > 0" class="flex space-x-2 overflow-x-auto no-scrollbar mb-6">
        <div v-for="(char, index) in characters" :key="char.id" 
             @click="activeIdx = index"
             class="flex-shrink-0 px-5 py-2 rounded-2xl text-xs font-bold transition-all shadow-sm"
             :class="activeIdx === index ? 'bg-cyan-500 text-white' : 'bg-white text-gray-400'">
            {{ char.name || '未命名' }}
        </div>
    </div>

    <!-- 卡片主区 -->
    <div v-if="currentChar" :key="currentChar.id" id="capture-area" class="glass rounded-[3rem] p-6 relative overflow-visible flex flex-col">
        
        <!-- A. 标签与头像 -->
        <div class="relative h-80 w-full mb-4" id="tag-zone">
            <div v-for="(tag, i) in currentChar.tags" :key="i"
                 class="draggable-item rounded-full text-[10px] font-bold"
                 @touchstart="startDrag($event, tag, 'tags', i)"
                 :style="{ left: tag.x + 'px', top: tag.y + 'px', transform: 'rotate('+tag.r+'deg)', backgroundColor: tag.c, color: '#444', zIndex: tag.z }">
                #{{ tag.text }}
            </div>

            <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                <div class="relative pointer-events-auto" style="z-index: 1000;">
                    <div @click="triggerUpload" class="w-32 h-32 rounded-full border-4 border-white shadow-2xl overflow-hidden bg-white flex items-center justify-center">
                        <img v-if="currentChar.avatar" :src="currentChar.avatar" class="w-full h-full object-cover">
                        <span v-else class="text-gray-300 text-xs">上传头像</span>
                    </div>
                    <button @click.stop="openInput('tags')" class="absolute bottom-1 right-1 w-9 h-9 bg-blue-500 text-white rounded-full border-2 border-white flex items-center justify-center shadow-xl">+</button>
                </div>
            </div>
            <input type="file" id="avatar-input" class="hidden" accept="image/*" @change="handleAvatar">
        </div>

        <input type="text" v-model="currentChar.name" class="w-full text-center bg-transparent text-2xl font-black text-gray-800 outline-none mb-6">

        <!-- B. 设定区 -->
        <div class="mb-10 px-2">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-[10px] font-black text-cyan-600 tracking-widest uppercase">/ Settings 设定</h2>
                <button @click="openInput('settings')" class="w-6 h-6 bg-cyan-100 text-cyan-600 rounded-full">+</button>
            </div>
            <div class="flex flex-wrap gap-2">
                <div v-for="(s, i) in currentChar.settings" :key="i" @touchstart="handleLongPress('settings', i)" class="px-4 py-1.5 rounded-lg text-xs font-bold water-chip">{{ s }}</div>
            </div>
        </div>

        <!-- C. 细节墙 -->
        <div class="mb-10 px-2">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-[10px] font-black text-yellow-500 tracking-widest uppercase">/ Details Wall 细节墙</h2>
                <button @click="openInput('details')" class="w-6 h-6 bg-yellow-100 text-yellow-600 rounded-full">+</button>
            </div>
            <div class="relative w-full border-2 border-dashed border-gray-100 rounded-3xl min-h-[250px]" :style="{ height: wallHeight + 'px' }">
                <div v-for="(note, i) in currentChar.details" :key="i"
                     class="draggable-item p-3 min-w-[100px] max-w-[150px] text-[11px] text-gray-700"
                     @touchstart="startDrag($event, note, 'details', i)"
                     :style="{ left: note.x + 'px', top: note.y + 'px', transform: 'rotate('+note.r+'deg)', backgroundColor: note.c, zIndex: note.z }">
                    <div v-if="note.deco === 'tape'" class="absolute -top-2 left-1/2 -translate-x-1/2 w-10 h-3 bg-white/40 border border-black/5 rotate-2"></div>
                    <div v-else class="absolute -top-1 left-1/2 -translate-x-1/2 w-2 h-2 rounded-full" :style="{backgroundColor: note.pinC}"></div>
                    {{ note.text }}
                </div>
            </div>
        </div>

        <!-- D. 弹幕部分 -->
        <div class="mb-10 px-2">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-[10px] font-black text-green-600 tracking-widest uppercase">/ Comments 弹幕</h2>
                <button @click="openInput('bullets')" class="w-6 h-6 bg-green-100 text-green-600 rounded-full">+</button>
            </div>
            <div class="flex flex-col space-y-6">
                <div v-for="(b, i) in currentChar.bullets" :key="i" :class="i % 2 === 0 ? 'self-start' : 'self-end'">
                    <div class="bubble shadow-sm" @touchstart="handleLongPress('bullets', i)" :style="{ background: getGreenGradient(i) }">{{ b }}</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 底部操作 -->
    <div v-if="currentChar" class="mt-8 grid grid-cols-2 gap-4 pb-12 px-2">
        <button @click="exportImage" class="bg-gray-800 text-white py-4 rounded-3xl font-bold shadow-lg">导出图片</button>
        <button @click="delCharacter" class="bg-red-50 text-red-400 py-4 rounded-3xl font-bold border border-red-100">删除角色</button>
    </div>

    <!-- 输入弹窗 -->
    <div v-if="showModal" class="fixed inset-0 bg-black/60 backdrop-blur-md flex items-center justify-center p-6 z-[9999]">
        <div class="bg-white rounded-[2rem] p-6 w-full max-w-sm">
            <textarea v-model="tempInput" placeholder="输入内容..." class="w-full h-32 p-4 bg-gray-50 rounded-2xl outline-none mb-6"></textarea>
            <div class="flex gap-4">
                <button @click="showModal = false" class="flex-1 py-3 text-gray-400 font-bold">取消</button>
                <button @click="confirmAdd" class="flex-1 py-3 bg-cyan-500 text-white rounded-2xl font-bold">确定</button>
            </div>
        </div>
    </div>
</div>

<script>
    const { createApp, ref, computed, watch } = Vue;

    createApp({
        setup() {
            const STORAGE_KEY = 'cards_v14_final';
            const characters = ref(JSON.parse(localStorage.getItem(STORAGE_KEY)) || []);
            const activeIdx = ref(0);
            const showModal = ref(false);
            const tempInput = ref('');
            const targetType = ref('');
            const maxZ = ref(100);
            const touchTimer = ref(null);

            const currentChar = computed(() => characters.value[activeIdx.value] || null);
            
            watch(characters, (v) => {
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(v));
                } catch (e) {
                    alert("⚠️ 存储空间已满。请导出部分单人角色存档并删除，以腾出空间。");
                }
            }, { deep: true });

            // [新增] 单人导出
            const exportSingle = () => {
                if(!currentChar.value) return;
                const data = JSON.stringify(currentChar.value);
                const blob = new Blob([data], { type: 'application/json' });
                downloadBlob(blob, `角色_${currentChar.value.name}.json`);
            };

            // [新增] 单人追加导入
            const importSingle = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const imported = JSON.parse(event.target.result);
                        if (imported && imported.id) {
                            // 赋予新ID防止冲突
                            imported.id = Date.now();
                            characters.value.push(imported);
                            activeIdx.value = characters.value.length - 1;
                            alert(`已追加导入角色：${imported.name}`);
                        }
                    } catch (err) { alert("导入失败，文件格式不正确"); }
                };
                reader.readAsText(file);
                e.target.value = '';
            };

            const exportAll = () => {
                const data = JSON.stringify(characters.value);
                const blob = new Blob([data], { type: 'application/json' });
                downloadBlob(blob, `全员备份_${new Date().toLocaleDateString()}.json`);
            };

            const importAll = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const imported = JSON.parse(ev.target.result);
                        if (Array.isArray(imported)) {
                            if (confirm(`检测到 ${imported.length} 个角色，是否替换现有全部数据？`)) {
                                characters.value = imported;
                                activeIdx.value = 0;
                            }
                        }
                    } catch (err) { alert("全量恢复失败，请检查文件"); }
                };
                reader.readAsText(file);
                e.target.value = '';
            };

            const downloadBlob = (blob, fileName) => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = fileName; a.click();
                URL.revokeObjectURL(url);
            };

            const wallHeight = computed(() => {
                if (!currentChar.value || !currentChar.value.details || currentChar.value.details.length === 0) return 250;
                const maxY = Math.max(...currentChar.value.details.map(d => d.y));
                return Math.max(250, maxY + 150);
            });

            const handleAvatar = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ex) => {
                    const img = new Image();
                    img.src = ex.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const targetSize = 400; 
                        canvas.width = targetSize; canvas.height = targetSize;
                        const aspect = img.width / img.height;
                        let sx, sy, sw, sh;
                        if (aspect > 1) { sh = img.height; sw = img.height; sx = (img.width - sw) / 2; sy = 0; }
                        else { sw = img.width; sh = img.width; sx = 0; sy = (img.height - sh) / 2; }
                        ctx.drawImage(img, sx, sy, sw, sh, 0, 0, targetSize, targetSize);
                        currentChar.value.avatar = canvas.toDataURL('image/jpeg', 0.8);
                    };
                };
                reader.readAsDataURL(file);
            };

            const confirmAdd = () => {
                if (!tempInput.value.trim()) return;
                const type = targetType.value;
                if (type === 'settings' || type === 'bullets') {
                    currentChar.value[type].push(tempInput.value.trim());
                } else {
                    maxZ.value++;
                    const newItem = {
                        text: tempInput.value.trim(),
                        x: 10 + Math.random() * 20, y: 10 + Math.random() * 20,
                        r: Math.random() * 10 - 5, z: maxZ.value,
                        c: ['#FFF9C4', '#F8BBD0', '#E1F5FE', '#E8F5E9', '#F3E5F5'][Math.floor(Math.random() * 5)]
                    };
                    if (type === 'details') {
                        newItem.deco = Math.random() > 0.5 ? 'tape' : 'pin';
                        newItem.pinC = ['#FF5E5E', '#5EAEFF', '#FFD15E'][Math.floor(Math.random()*3)];
                    }
                    currentChar.value[type].push(newItem);
                }
                showModal.value = false;
                tempInput.value = '';
            };

            const startDrag = (e, item, type, index) => {
                const touch = e.touches[0];
                const startX = touch.clientX - item.x;
                const startY = touch.clientY - item.y;
                maxZ.value++; item.z = maxZ.value;
                touchTimer.value = setTimeout(() => { if(confirm('删除此内容？')) currentChar.value[type].splice(index, 1); }, 800);
                const moveDrag = (ev) => {
                    clearTimeout(touchTimer.value);
                    item.x = ev.touches[0].clientX - startX;
                    item.y = ev.touches[0].clientY - startY;
                };
                const stopDrag = () => {
                    clearTimeout(touchTimer.value);
                    document.removeEventListener('touchmove', moveDrag);
                    document.removeEventListener('touchend', stopDrag);
                };
                document.addEventListener('touchmove', moveDrag, { passive: false });
                document.addEventListener('touchend', stopDrag);
            };

            const getGreenGradient = (i) => ['linear-gradient(135deg, #a8e063 0%, #56ab2f 100%)', 'linear-gradient(135deg, #11998e 0%, #38ef7d 100%)', 'linear-gradient(135deg, #7CB342 100%)'][i % 3];

            const exportImage = () => {
                const area = document.getElementById('capture-area');
                document.body.classList.add('exporting');
                // 等待布局重绘
                setTimeout(() => {
                    html2canvas(area, { 
                        useCORS: true, 
                        scale: 2,
                        backgroundColor: '#f0f4f8'
                    }).then(canvas => {
                        const link = document.createElement('a');
                        link.download = `${currentChar.value.name}.png`;
                        link.href = canvas.toDataURL('image/png');
                        link.click();
                        document.body.classList.remove('exporting');
                    });
                }, 500);
            };

            const delCharacter = () => {
                if (confirm('删除角色？')) {
                    characters.value.splice(activeIdx.value, 1);
                    activeIdx.value = Math.max(0, activeIdx.value - 1);
                }
            };

            const addCharacter = () => {
                characters.value.push({ id: Date.now(), name: '新角色', avatar: '', tags: [], settings: [], details: [], bullets: [] });
                activeIdx.value = characters.value.length - 1;
            };

            return {
                characters, activeIdx, currentChar, showModal, tempInput, wallHeight,
                addCharacter, triggerUpload, handleAvatar, openInput, confirmAdd, 
                startDrag, getGreenGradient, exportImage, delCharacter, 
                exportSingle, importSingle, exportAll, importAll, clearAllData: () => { if(confirm('全清？')) { localStorage.clear(); location.reload(); } }
            }
        }
    }).mount('#app');
</script>
</body>
</html>
