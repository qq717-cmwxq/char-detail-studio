<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>角色档案卡册</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 html2canvas 用于导出图片 -->
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <!-- 引入 Vue 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap');
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            margin: 0;
            padding-bottom: 100px;
        }

        .glass {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        /* 长按震动反馈模拟动画 */
        .shake {
            animation: shake 0.5s infinite;
        }
        @keyframes shake {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(1deg); }
            75% { transform: rotate(-1deg); }
            100% { transform: rotate(0deg); }
        }

        /* 隐藏滚动条 */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
<div id="app" class="p-4 max-w-md mx-auto">
    
    <!-- 顶部导航 -->
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold text-gray-700">我的卡册</h1>
        <button @click="addCharacter" class="bg-white/60 p-2 rounded-full shadow-sm">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
            </svg>
        </button>
    </div>

    <!-- 角色列表切换 -->
    <div class="flex space-x-2 overflow-x-auto mb-6 pb-2">
        <div v-for="(char, index) in characters" :key="char.id" 
             @click="activeIdx = index"
             class="flex-shrink-0 px-4 py-2 rounded-full text-sm font-medium transition-all"
             :class="activeIdx === index ? 'bg-blue-400 text-white' : 'bg-white/50 text-gray-500'">
            {{ char.name || '未命名' }}
        </div>
    </div>

    <!-- 核心卡片区域 (将被导出) -->
    <div v-if="currentChar" id="capture-area" class="glass rounded-[2rem] p-6 relative transition-all overflow-hidden">
        
        <!-- 背景装饰色块 -->
        <div class="absolute -top-10 -right-10 w-40 h-40 bg-blue-200/30 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-10 -left-10 w-40 h-40 bg-pink-200/30 rounded-full blur-3xl"></div>

        <!-- 头像与名称 -->
        <div class="flex flex-col items-center mb-8 relative">
            <div @click="triggerUpload" class="w-32 h-32 rounded-full border-4 border-white overflow-hidden shadow-lg bg-gray-100 mb-4">
                < img v-if="currentChar.avatar" :src="currentChar.avatar" class="w-full h-full object-cover">
                <div v-else class="w-full h-full flex items-center justify-center text-gray-400">点击上传</div>
            </div>
            <input type="text" v-model="currentChar.name" placeholder="点击输入角色名" 
                   class="bg-transparent text-center text-xl font-bold text-gray-800 outline-none border-b border-transparent focus:border-gray-300">
            <input type="file" id="avatar-input" class="hidden" @change="handleAvatar">
        </div>

        <!-- 板块1：标签 (蓝色胶囊) -->
        <div class="mb-6">
            <div class="flex justify-between items-center mb-2">
                <span class="text-xs font-bold text-blue-400 uppercase tracking-widest">Tags / 标签</span>
                <button @click="addItem('tags')" class="text-blue-400 text-xl">+</button>
            </div>
            <div class="flex flex-wrap gap-2">
                <div v-for="(item, i) in currentChar.tags" :key="i"
                     @touchstart="startTouch('tags', i)" @touchend="endTouch"
                     class="px-3 py-1 bg-blue-100/60 text-blue-600 rounded-full text-sm border border-blue-200">
                    # {{ item }}
                </div>
            </div>
        </div>

        <!-- 板块2：设定 (粉色边框) -->
        <div class="mb-6">
            <div class="flex justify-between items-center mb-2">
                <span class="text-xs font-bold text-pink-400 uppercase tracking-widest">Settings / 设定</span>
                <button @click="addItem('settings')" class="text-pink-400 text-xl">+</button>
            </div>
            <div class="grid grid-cols-2 gap-2">
                <div v-for="(item, i) in currentChar.settings" :key="i"
                     @touchstart="startTouch('settings', i)" @touchend="endTouch"
                     class="p-2 border-2 border-dashed border-pink-200 rounded-xl text-pink-700 text-xs text-center">
                    {{ item }}
                </div>
            </div>
        </div>

        <!-- 板块3：细节 (黄色笔记) -->
        <div class="mb-6">
            <div class="flex justify-between items-center mb-2">
                <span class="text-xs font-bold text-yellow-500 uppercase tracking-widest">Details / 细节</span>
                <button @click="addItem('details')" class="text-yellow-500 text-xl">+</button>
            </div>
            <div class="space-y-2">
                <div v-for="(item, i) in currentChar.details" :key="i"
                     @touchstart="startTouch('details', i)" @touchend="endTouch"
                     class="p-3 bg-yellow-50/80 rounded-lg text-gray-700 text-sm shadow-sm border-l-4 border-yellow-300">
                    {{ item }}
                </div>
            </div>
        </div>

        <!-- 板块4：弹幕 (绿色气泡) -->
        <div class="mb-4">
            <div class="flex justify-between items-center mb-2">
                <span class="text-xs font-bold text-green-500 uppercase tracking-widest">Comments / 评价</span>
                <button @click="addItem('bullets')" class="text-green-500 text-xl">+</button>
            </div>
            <div class="flex flex-col space-y-2">
                <div v-for="(item, i) in currentChar.bullets" :key="i"
                     @touchstart="startTouch('bullets', i)" @touchend="endTouch"
                     class="self-start px-4 py-2 bg-green-400 text-white rounded-t-2xl rounded-br-2xl text-xs shadow-sm ml-2 relative">
                     <span class="absolute -left-2 bottom-0 w-0 h-0 border-8 border-transparent border-r-green-400"></span>
                    {{ item }}
                </div>
            </div>
        </div>
    </div>

    <!-- 操作按钮区 -->
    <div v-if="currentChar" class="mt-8 flex space-x-4">
        <button @click="exportImage" class="flex-1 bg-indigo-500 text-white py-3 rounded-2xl font-bold shadow-lg active:scale-95 transition-transform">
            导出图片卡册
        </button>
        <button @click="delCharacter" class="px-6 py-3 bg-red-100 text-red-500 rounded-2xl font-bold active:scale-95 transition-transform">
            删除角色
        </button>
    </div>

    <!-- 底部提示 -->
    <p class="text-center text-gray-400 text-xs mt-6">提示：点击 "+" 添加内容，长按条目可删除</p >

    <!-- 输入对话框 (简易版) -->
    <div v-if="showModal" class="fixed inset-0 bg-black/50 flex items-center justify-center p-6 z-50">
        <div class="bg-white rounded-3xl p-6 w-full max-w-sm">
            <h3 class="text-lg font-bold mb-4">添加新内容</h3>
            <textarea v-model="tempInput" class="w-full h-24 p-3 bg-gray-100 rounded-xl outline-none mb-4" placeholder="请输入内容..."></textarea>
            <div class="flex space-x-3">
                <button @click="showModal = false" class="flex-1 py-2 text-gray-500 font-medium">取消</button>
                <button @click="confirmAdd" class="flex-1 py-2 bg-blue-500 text-white rounded-xl font-medium">确认</button>
            </div>
        </div>
    </div>
</div>

<script>
    const { createApp, ref, computed, onMounted, watch } = Vue;

    createApp({
        setup() {
            // 数据结构
            const characters = ref(JSON.parse(localStorage.getItem('my_chars')) || [
                {
                    id: Date.now(),
                    name: '示例角色',
                    avatar: '',
                    tags: ['年上', '纯爱'],
                    settings: ['戴眼镜', '黑色风衣'],
                    details: ['喝咖啡从不加糖', '紧张时会下意识摸左手手链'],
                    bullets: ['这CP真的太好嗑了！', '这也太苏了吧...']
                }
            ]);

            const activeIdx = ref(0);
            const showModal = ref(false);
            const tempInput = ref('');
            const targetType = ref('');
            const touchTimer = ref(null);

            const currentChar = computed(() => characters.value[activeIdx.ref] || characters.value[activeIdx.value]);

            // 持久化存储
            watch(characters, (newVal) => {
                localStorage.setItem('my_chars', JSON.stringify(newVal));
            }, { deep: true });

            const addCharacter = () => {
                const newChar = {
                    id: Date.now(),
                    name: '新角色',
                    avatar: '',
                    tags: [], settings: [], details: [], bullets: []
                };
                characters.value.push(newChar);
                activeIdx.value = characters.value.length - 1;
            };

            const delCharacter = () => {
                if(confirm('确定要永久删除这个角色吗？')) {
                    characters.value.splice(activeIdx.value, 1);
                    if(activeIdx.value > 0) activeIdx.value--;
                }
            };

            const triggerUpload = () => document.getElementById('avatar-input').click();

            const handleAvatar = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (ex) => { currentChar.value.avatar = ex.target.result; };
                    reader.readAsDataURL(file);
                }
            };

            const addItem = (type) => {
                targetType.value = type;
                tempInput.value = '';
                showModal.value = true;
            };

            const confirmAdd = () => {
                if(tempInput.value.trim()) {
                    currentChar.value[targetType.value].push(tempInput.value.trim());
                    showModal.value = false;
                }
            };

            // 长按删除交互逻辑
            const startTouch = (type, index) => {
                touchTimer.value = setTimeout(() => {
                    if(confirm('要删除这条内容吗？')) {
                        currentChar.value[type].splice(index, 1);
                    }
                }, 800); // 800毫秒触发长按
            };

            const endTouch = () => {
                clearTimeout(touchTimer.value);
            };

            // 导出图片
            const exportImage = () => {
                const area = document.getElementById('capture-area');
                html2canvas(area, {
                    backgroundColor: null,
                    scale: 2, // 提高清晰度
                    useCORS: true
                }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `${currentChar.value.name}_记录卡.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                });
            };

            return {
                characters, activeIdx, currentChar, showModal, tempInput,
                addCharacter, delCharacter, triggerUpload, handleAvatar,
                addItem, confirmAdd, startTouch, endTouch, exportImage
            }
        }
    }).mount('#app');
</script>
</body>
</html>
